services:
  postgres:
    image: postgres:16-alpine
    container_name: dict-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dictionary
      POSTGRES_USER: dictuser
      POSTGRES_PASSWORD: dictpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dictuser -d dictionary"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dict-redis
    restart: unless-stopped
    ports:
      - "6399:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dict-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://dictuser:dictpass@postgres:5432/dictionary
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your_super_secret_key_change_in_production
      JWT_EXPIRES_IN: 1h
      PORT: 3000
      FRONTEND_URL: http://localhost:3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dict-web
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
